app = 'shopping-list'
primary_region = 'fra'

[build]

[env]
  DATABASE_URL = 'file:/litefs/prod.db'
  PRIMARY_REGION = 'fra'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'shopping_list_data'
  destination = '/var/lib/litefs'
